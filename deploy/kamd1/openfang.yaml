# openfang — kamd1 cluster, namespace: openfang
#
# Serves https://openfang.pageapp.net. Captured from the live cluster with
# controller-written state stripped (finalizers, PVC volumeName, assigned
# clusterIP/nodePort, revision and Rancher endpoint annotations) so this
# applies cleanly to an empty namespace.
#
# Placeholders (envsubst before apply):
#   ${IMAGE_TAG}         image tag, e.g. v0.1.3
#   ${OPENFANG_API_KEY}  substituted into config.template.toml
#
# NOT included (create out-of-band, never commit):
#   secret/openfang-secrets  keys: NVIDIA_API_KEY, OLLAMA_API_KEY,
#                            OPENFANG_WEBHOOK_TOKEN, SCREENBUDDY_API_KEY,
#                            TELEGRAM_BOT_TOKEN
#   secret/regcredpageapp    harbor.pageapp.net pull creds
#   secret/pageapp-net-tls   TLS cert for *.pageapp.net
#   configmap/openfang-config  from config.template.toml
#
# Routing: the /hooks/ route is matched at a higher priority than the catch-all
# and intentionally carries no oauth2-proxy middleware, so webhook callbacks
# are authenticated by the application rather than by SSO. Everything else is
# routed through auth.pageapp.net. Do not reorder or drop the route priorities.
#
# NOTE: OPENFANG_API_KEY and OPENFANG_WEBHOOK_TOKEN must currently be set to
# the same value. Rotate them together, never independently.
#
# Known gaps in the live deployment, captured as-is:
#   - IngressRoute uses the deprecated traefik.containo.us/v1alpha1 API group.
#   - Pod securityContext is empty and the container sets no resource limits.
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfang
  namespace: openfang
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: openfang
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openfang
    spec:
      containers:
      - env:
        - name: ENVIRONMENT_TYPE
          value: PROD
        - name: VERSION
          value: ${IMAGE_TAG}
        - name: DOMAIN
          value: pageapp
        envFrom:
        - secretRef:
            name: openfang-secrets
        image: harbor.pageapp.net/docker-registry/openfang:${IMAGE_TAG}
        imagePullPolicy: IfNotPresent
        name: openfang
        ports:
        - containerPort: 4200
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: data
        - mountPath: /data/config.toml
          name: config
          subPath: config.toml
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: regcredpageapp
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: openfang-data
      - configMap:
          defaultMode: 420
          name: openfang-config
        name: config

---
apiVersion: v1
kind: Service
metadata:
  name: openfang
  namespace: openfang
spec:
  externalTrafficPolicy: Cluster
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 4200
  selector:
    app: openfang
  sessionAffinity: None
  type: LoadBalancer

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openfang-data
  namespace: openfang
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  volumeMode: Filesystem

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  annotations:
    kubernetes.io/ingress.class: traefik-external
  name: openfang-ingress
  namespace: openfang
spec:
  entryPoints:
  - web
  - websecure
  routes:
  - kind: Rule
    match: Host(`openfang.pageapp.net`) && PathPrefix(`/hooks/`)
    priority: 100
    services:
    - name: openfang
      port: 80
  - kind: Rule
    match: Host(`openfang.pageapp.net`)
    middlewares:
    - name: oauth2-proxy-middleware
    priority: 10
    services:
    - name: openfang
      port: 80
  tls:
    secretName: pageapp-net-tls

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-middleware
  namespace: openfang
spec:
  forwardAuth:
    address: https://auth.pageapp.net/?rd=https%3A%2F%2Fopenfang.pageapp.net
    trustForwardHeader: true
