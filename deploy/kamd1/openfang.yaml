# openfang — kamd1 cluster (kubernetes-admin@kubernetes), namespace: openfang
#
# Serves https://openfang.pageapp.net. Captured from the live cluster.
#
# Placeholders (envsubst before apply):
#   ${IMAGE_TAG}         image tag, e.g. v0.1.3
#   ${OPENFANG_API_KEY}  dashboard/API key -- see config.toml note below
#
# NOT included (create out-of-band, never commit):
#   secret/openfang-secrets  keys: NVIDIA_API_KEY, OLLAMA_API_KEY,
#                            OPENFANG_WEBHOOK_TOKEN, SCREENBUDDY_API_KEY,
#                            TELEGRAM_BOT_TOKEN
#   secret/regcredpageapp     harbor.pageapp.net pull creds
#   secret/pageapp-net-tls    TLS cert for *.pageapp.net
#
# Routing: the /hooks/ route is matched at a higher priority than the catch-all
# and intentionally carries no oauth2-proxy middleware, so webhook callbacks
# are authenticated by the application rather than by SSO. Everything else is
# routed through auth.pageapp.net. Do not reorder or drop the route priorities.
#
# NOTE: OPENFANG_API_KEY and OPENFANG_WEBHOOK_TOKEN must currently be set to
# the same value. Rotate them together, never independently.
#
---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    deployment.kubernetes.io/revision: '18'
    field.cattle.io/publicEndpoints: '[{"addresses":["192.168.0.111"],"port":80,"protocol":"TCP","serviceName":"openfang:openfang","allNodes":false}]'
  name: openfang
  namespace: openfang
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: openfang
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: '2026-07-01T17:36:10Z'
      labels:
        app: openfang
    spec:
      containers:
      - env:
        - name: ENVIRONMENT_TYPE
          value: PROD
        - name: VERSION
          value: v0.1.2
        - name: DOMAIN
          value: pageapp
        envFrom:
        - secretRef:
            name: openfang-secrets
        image: harbor.pageapp.net/docker-registry/openfang:${IMAGE_TAG}
        imagePullPolicy: IfNotPresent
        name: openfang
        ports:
        - containerPort: 4200
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /data
          name: data
        - mountPath: /data/config.toml
          name: config
          subPath: config.toml
      dnsPolicy: ClusterFirst
      imagePullSecrets:
      - name: regcredpageapp
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: openfang-data
      - configMap:
          defaultMode: 420
          name: openfang-config
        name: config

---
apiVersion: v1
kind: Service
metadata:
  annotations:
    field.cattle.io/publicEndpoints: '[{"addresses":["192.168.0.111"],"port":80,"protocol":"TCP","serviceName":"openfang:openfang","allNodes":false}]'
    metallb.universe.tf/ip-allocated-from-pool: my-ip-pool
  name: openfang
  namespace: openfang
spec:
  allocateLoadBalancerNodePorts: true
  clusterIP: 10.100.242.228
  clusterIPs:
  - 10.100.242.228
  externalTrafficPolicy: Cluster
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    nodePort: 30203
    port: 80
    protocol: TCP
    targetPort: 4200
  selector:
    app: openfang
  sessionAffinity: None
  type: LoadBalancer

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  annotations:
    pv.kubernetes.io/bind-completed: 'yes'
    pv.kubernetes.io/bound-by-controller: 'yes'
    volume.beta.kubernetes.io/storage-provisioner: driver.longhorn.io
    volume.kubernetes.io/storage-provisioner: driver.longhorn.io
  finalizers:
  - kubernetes.io/pvc-protection
  name: openfang-data
  namespace: openfang
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
  volumeMode: Filesystem
  volumeName: pvc-7b848ce6-474d-4b5d-bace-34d787716a77

---
apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  annotations:
    kubernetes.io/ingress.class: traefik-external
  name: openfang-ingress
  namespace: openfang
spec:
  entryPoints:
  - web
  - websecure
  routes:
  - kind: Rule
    match: Host(`openfang.pageapp.net`) && PathPrefix(`/hooks/`)
    priority: 100
    services:
    - name: openfang
      port: 80
  - kind: Rule
    match: Host(`openfang.pageapp.net`)
    middlewares:
    - name: oauth2-proxy-middleware
    priority: 10
    services:
    - name: openfang
      port: 80
  tls:
    secretName: pageapp-net-tls

---
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  annotations: {}
  name: oauth2-proxy-middleware
  namespace: openfang
spec:
  forwardAuth:
    address: https://auth.pageapp.net/?rd=https%3A%2F%2Fopenfang.pageapp.net
    trustForwardHeader: true
